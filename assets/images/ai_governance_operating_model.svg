<svg width="680" height="700" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AI governance operating model</title>
<desc>Governance inputs connect to AI governance at the center, which also connects to business and technology functions on its left and monitoring, assurance, and feedback on its right, then down to decisions and direction, then down to governance outputs.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #2C2C2A; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  rect.box { fill: #FFFFFF; stroke: #B4B2A9; }
  line.arr { stroke: #3d3d3a; stroke-width: 1; }
</style>

<!-- Inputs -->
<g><rect class="box" x="190" y="40" width="300" height="100" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="62" text-anchor="middle">INPUTS</text>
<text class="ts" x="340" y="84" text-anchor="middle">Business Use Cases</text>
<text class="ts" x="340" y="100" text-anchor="middle">Legal &amp; Regulatory </text>
<text class="ts" x="340" y="116" text-anchor="middle">Risk &amp; Human Impact</text></g>

<line x1="340" y1="155" x2="340" y2="175" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<!-- Middle row -->
<g><rect class="box" x="40" y="190" width="170" height="120" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="215" text-anchor="middle">BUSINESS &amp;</text>
<text class="th" x="125" y="233" text-anchor="middle">TECHNOLOGY</text>
<text class="ts" x="125" y="255" text-anchor="middle">Implementation</text>
<text class="ts" x="125" y="271" text-anchor="middle">Control Operation</text>
<text class="ts" x="125" y="287" text-anchor="middle">Evidence</text></g>

<g><rect class="box" x="245" y="190" width="190" height="120" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="215" text-anchor="middle">AI</text>
<text class="th" x="340" y="233" text-anchor="middle">GOVERNANCE</text>
<text class="ts" x="340" y="255" text-anchor="middle">Policy &amp; Oversight</text>
<text class="ts" x="340" y="271" text-anchor="middle">Decision-Making</text>
<text class="ts" x="340" y="287" text-anchor="middle">Control Requirements</text></g>

<g><rect class="box" x="470" y="190" width="170" height="120" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="215" text-anchor="middle">MONITORING &amp;</text>
<text class="th" x="555" y="233" text-anchor="middle">ASSURANCE</text>
<text class="ts" x="555" y="255" text-anchor="middle">Control Effectiveness</text>
<text class="ts" x="555" y="271" text-anchor="middle">Exceptions &amp; Findings</text>
<text class="ts" x="555" y="287" text-anchor="middle">Continuous Feedback</text></g>

<line x1="215" y1="250" x2="240" y2="250" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="440" y1="250" x2="465" y2="250" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<line x1="340" y1="325" x2="340" y2="365" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<!-- Decisions -->
<g><rect class="box" x="190" y="380" width="300" height="100" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="402" text-anchor="middle">DECISIONS &amp; DIRECTION</text>
<text class="ts" x="340" y="424" text-anchor="middle">Accountability</text>
<text class="ts" x="340" y="440" text-anchor="middle">Communications</text>
<text class="ts" x="340" y="456" text-anchor="middle">Conditions &amp; Outcomes</text></g>

<line x1="340" y1="495" x2="340" y2="535" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<!-- Outputs -->
<g>
  <rect class="box" x="190" y="550" width="300" height="100" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="572" text-anchor="middle">OUTPUTS</text>
  <text class="ts" x="340" y="594" text-anchor="middle">Controlled AI Use</text>
  <text class="ts" x="340" y="610" text-anchor="middle">Documented Decisions</text>
  <text class="ts" x="340" y="626" text-anchor="middle">Risk-Informed Outcomes</text>
</g>
</svg>
