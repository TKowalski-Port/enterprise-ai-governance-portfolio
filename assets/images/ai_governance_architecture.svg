<svg width="680" height="630" viewBox="0 0 680 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Enterprise Company AI governance architecture</title>
<desc>The Board, Executive Leadership, AI Governance Committee, and Operations form the primary governance chain. GRC provides enterprise-wide governance, risk, and compliance oversight. Internal Audit provides independent assurance across AI governance and controls.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    fill: #2C2C2A;
  }

  .th {
    font-size: 14px;
    font-weight: 500;
  }

  .ts {
    font-size: 12px;
    font-weight: 400;
  }

  rect.box {
    fill: #FFFFFF;
    stroke: #B4B2A9;
  }

  rect.side {
    fill: #FFFFFF;
    stroke: #B4B2A9;
    stroke-dasharray: 6 4;
  }

  line.arr {
    stroke: #3d3d3a;
    stroke-width: 1;
  }

  line.support {
    stroke: #3d3d3a;
    stroke-width: 1;
    stroke-dasharray: 5 4;
  }
</style>

<!-- GRC -->
<g>
  <rect class="side" x="20" y="40" width="140" height="550" rx="8" stroke-width="0.5"/>
  <text class="th" x="90" y="275" text-anchor="middle">GRC</text>
  <text class="ts" x="90" y="301" text-anchor="middle">Enterprise-Wide</text>
  <text class="ts" x="90" y="317" text-anchor="middle">Governance, Risk,</text>
  <text class="ts" x="90" y="333" text-anchor="middle">and Compliance</text>
  <text class="ts" x="90" y="349" text-anchor="middle">Oversight</text>
</g>

<!-- Board -->
<g>
  <rect class="box" x="190" y="40" width="300" height="100" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="62" text-anchor="middle">BOARD</text>
  <text class="ts" x="340" y="84" text-anchor="middle">Oversight of</text> <text class="ts" x="340" y="100" text-anchor="middle">Material AI Risk</text>
</g>

<!-- Executive Leadership -->
<g>
  <rect class="box" x="190" y="190" width="300" height="100" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="212" text-anchor="middle">EXECUTIVE LEADERSHIP</text>
  <text class="ts" x="340" y="238" text-anchor="middle">Enterprise Accountability</text>
  <text class="ts" x="340" y="254" text-anchor="middle">for AI Risk</text>
</g>

<!-- AI Governance Committee -->
<g>
  <rect class="box" x="190" y="340" width="300" height="100" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="362" text-anchor="middle">AI GOVERNANCE COMMITTEE</text>
  <text class="ts" x="340" y="388" text-anchor="middle">Governance Decisions</text>
  <text class="ts" x="340" y="404" text-anchor="middle">and Oversight</text>
</g>

<!-- Operations -->
<g>
  <rect class="box" x="190" y="490" width="300" height="100" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="512" text-anchor="middle">OPERATIONS</text>
  <text class="ts" x="340" y="538" text-anchor="middle">Executes Approved</text>
  <text class="ts" x="340" y="554" text-anchor="middle">AI Activities</text>
</g>

<!-- Internal Audit -->
<g>
  <rect class="side" x="520" y="40" width="140" height="550" rx="8" stroke-width="0.5"/>
  <text class="th" x="590" y="275" text-anchor="middle">INTERNAL AUDIT</text>
<text class="ts" x="590" y="301" text-anchor="middle">Independent</text>
<text class="ts" x="590" y="317" text-anchor="middle">Assurance</text>
<text class="ts" x="590" y="333" text-anchor="middle">Across AI Governance</text>
<text class="ts" x="590" y="349" text-anchor="middle">and Controls</text>
</g>

<!-- Main governance chain -->
<line x1="340" y1="155" x2="340" y2="175" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="340" y1="305" x2="340" y2="325" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="340" y1="455" x2="340" y2="475" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<!-- GRC relationships -->
<line x1="165" y1="90" x2="185" y2="90" class="support" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="165" y1="240" x2="185" y2="240" class="support" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="165" y1="390" x2="185" y2="390" class="support" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="165" y1="540" x2="185" y2="540" class="support" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<!-- Internal Audit relationships -->
<line x1="495" y1="90" x2="515" y2="90" class="support" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="495" y1="240" x2="515" y2="240" class="support" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="495" y1="390" x2="515" y2="390" class="support" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="495" y1="540" x2="515" y2="540" class="support" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
</svg>
